[package]
name = "ns-usbloader-rs"
description = "CLI alternative to NS-USBloader. Transfer data to Awoo Installer."
version = "0.1.0"
edition = "2024"

[dependencies]
clap = { version = "4", features = ["derive"] }
color-eyre = "0.6"
env_logger = "0.11"
indicatif = "0.18"
log = "0.4"
nusb = "0.2"

[profile.dev.package.backtrace]
opt-level = 3
