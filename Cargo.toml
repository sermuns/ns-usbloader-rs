[workspace]
resolver = "3"
members = [
  "cli",
  "core",
]

[workspace.package]
version = "0.1.2"
edition = "2024"
license = "MIT OR Apache-2.0"
repository = "https://github.com/sermuns/ironfoil"

[workspace.dependencies]
log = "0.4"
color-eyre = { version = "0.6", default-features = false, features = ["track-caller"] }
indicatif = "0.18"

[profile.dev.package.backtrace]
opt-level = 3
