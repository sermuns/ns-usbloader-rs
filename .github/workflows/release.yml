# Based on https://github.com/orhun/binsider/blob/a314d3c69504c346442870ee4d500e9883c7ec6c/.github/workflows/cd.yml

name: Release
on:
  push:
    tags:
      - "*"

env:
  CLI_NAME: ironfoil
  GUI_NAME: ironfoil-gui

jobs:
  publish-github:
    name: Publish for ${{ matrix.build.OS }} (${{ matrix.build.TARGET }})
    runs-on: ${{ matrix.build.OS }}
    permissions:
      contents: write # for publishing release?
    strategy:
      fail-fast: false
      matrix:
        build:
          - {
              OS: ubuntu-22.04,
              TOOLCHAIN: stable,
              TARGET: x86_64-unknown-linux-gnu,
            }
          - {
              OS: ubuntu-22.04,
              TOOLCHAIN: stable,
              TARGET: x86_64-unknown-linux-musl,
            }
          # - {
          #     OS: ubuntu-22.04,
          #     TOOLCHAIN: stable,
          #     TARGET: aarch64-unknown-linux-gnu,
          #   }
          # - {
          #     OS: ubuntu-22.04,
          #     TOOLCHAIN: stable,
          #     TARGET: riscv64gc-unknown-linux-gnu,
          #   }
          # - {
          #     OS: ubuntu-22.04,
          #     TOOLCHAIN: stable,
          #     TARGET: i686-unknown-linux-gnu,
          #   }
          # - {
          #     OS: ubuntu-22.04,
          #     TOOLCHAIN: stable,
          #     TARGET: i686-unknown-linux-musl,
          #   }
          # - {
          #     OS: ubuntu-22.04,
          #     TOOLCHAIN: stable,
          #     TARGET: aarch64-unknown-linux-musl,
          #   }
          # - {
          #     OS: ubuntu-22.04,
          #     TOOLCHAIN: stable,
          #     TARGET: armv5te-unknown-linux-gnueabi,
          #   }
          # - {
          #     OS: ubuntu-22.04,
          #     TOOLCHAIN: stable,
          #     TARGET: armv7-unknown-linux-gnueabihf,
          #   }
          # - {
          #     OS: ubuntu-22.04,
          #     TOOLCHAIN: stable,
          #     TARGET: arm-unknown-linux-gnueabi,
          #   }
          # - {
          #     OS: ubuntu-22.04,
          #     TOOLCHAIN: stable,
          #     TARGET: arm-unknown-linux-gnueabihf,
          #   }
          # - {
          #     OS: ubuntu-22.04,
          #     TOOLCHAIN: stable,
          #     TARGET: powerpc64le-unknown-linux-gnu,
          #   }
          - {
              OS: windows-2022,
              TOOLCHAIN: stable,
              TARGET: x86_64-pc-windows-msvc,
            }
          - { OS: macos-14, TOOLCHAIN: stable, TARGET: x86_64-apple-darwin }
          - { OS: macos-14, TOOLCHAIN: stable, TARGET: aarch64-apple-darwin }
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set the release version
        shell: bash
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.build.TARGET }}

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.build.TARGET }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.build.TARGET }}

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p ${{env.CLI_NAME}}-${{env.RELEASE_VERSION}} ${{env.GUI_NAME}}-${{env.RELEASE_VERSION}}
          cp {LICENSE-MIT,LICENSE-APACHE,README.md,CHANGELOG.md} ${{env.CLI_NAME}}-${{env.RELEASE_VERSION}}/
          cp {LICENSE-MIT,LICENSE-APACHE,README.md,CHANGELOG.md} ${{env.GUI_NAME}}-${{env.RELEASE_VERSION}}/
          if [ "${{ matrix.build.OS }}" = "windows-2022" ]; then
            cp target/${{ matrix.build.TARGET }}/release/${{env.CLI_NAME}}.exe ${{env.CLI_NAME}}-${{env.RELEASE_VERSION}}/
            cp target/${{ matrix.build.TARGET }}/release/${{env.GUI_NAME}}.exe ${{env.GUI_NAME}}-${{env.RELEASE_VERSION}}/
          else
            cp target/${{ matrix.build.TARGET }}/release/${{env.CLI_NAME}} ${{env.CLI_NAME}}-${{env.RELEASE_VERSION}}/
            cp target/${{ matrix.build.TARGET }}/release/${{env.GUI_NAME}} ${{env.GUI_NAME}}-${{env.RELEASE_VERSION}}/
          fi

      - name: Create release artifacts
        shell: bash
        run: |
          if [ "${{ matrix.build.OS }}" = "windows-2022" ]; then
            7z a -tzip "${{env.CLI_NAME}}-${{ matrix.build.TARGET }}.zip" ${{env.CLI_NAME}}-${{ env.RELEASE_VERSION }}/
            7z a -tzip "${{env.GUI_NAME}}-${{ matrix.build.TARGET }}.zip" ${{env.GUI_NAME}}-${{ env.RELEASE_VERSION }}/
          else
            tar -czvf ${{env.CLI_NAME}}-${{ matrix.build.TARGET }}.tar.gz ${{env.CLI_NAME}}-${{ env.RELEASE_VERSION }}/
            shasum -a 512 ${{env.CLI_NAME}}-${{ matrix.build.TARGET }}.tar.gz > ${{env.CLI_NAME}}-${{ matrix.build.TARGET }}.tar.gz.sha512
            tar -czvf ${{env.GUI_NAME}}-${{ matrix.build.TARGET }}.tar.gz ${{env.GUI_NAME}}-${{ env.RELEASE_VERSION }}/
            shasum -a 512 ${{env.GUI_NAME}}-${{ matrix.build.TARGET }}.tar.gz > ${{env.GUI_NAME}}-${{ matrix.build.TARGET }}.tar.gz.sha512
          fi

      - name: Release notes
        shell: bash
        id: release-notes
        run: |
          echo "RELEASE_BODY<<EOF" >> $GITHUB_OUTPUT
          sed -n '/^## \[${{ env.RELEASE_VERSION }}\].*$/,/^## /p' CHANGELOG.md | sed '$d'
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload the binary releases
        uses: svenstaro/upload-release-action@v2
        with:
          file: "*-${{ matrix.build.TARGET }}*"
          file_glob: true
          overwrite: true
          tag: ${{ github.ref }}
          release_name: v${{ env.RELEASE_VERSION }}
          body: |
            ${{ steps.release-notes.outputs.RELEASE_BODY }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}

  publish-crates-io:
    name: Publish on crates.io
    needs: publish-github
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Publish
        run: cargo publish --locked --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
