# Based on https://github.com/orhun/binsider/blob/a314d3c69504c346442870ee4d500e9883c7ec6c/.github/workflows/cd.yml

name: CD
on:
  push:
    tags:
      - "*"

env:
  CRATE_NAME: ironfoil

jobs:
  publish-github:
    name: Publish for ${{ matrix.build.OS }} (${{ matrix.build.TARGET }})
    runs-on: ${{ matrix.build.OS }}
    strategy:
      fail-fast: false
      matrix:
        build:
          - {
              OS: ubuntu-22.04,
              TOOLCHAIN: stable,
              TARGET: x86_64-unknown-linux-gnu,
            }
          - {
              OS: ubuntu-22.04,
              TOOLCHAIN: stable,
              TARGET: x86_64-unknown-linux-musl,
            }
          - {
              OS: ubuntu-22.04,
              TOOLCHAIN: stable,
              TARGET: aarch64-unknown-linux-gnu,
            }
          - {
              OS: ubuntu-22.04,
              TOOLCHAIN: stable,
              TARGET: riscv64gc-unknown-linux-gnu,
            }
          - {
              OS: ubuntu-22.04,
              TOOLCHAIN: stable,
              TARGET: i686-unknown-linux-gnu,
            }
          - {
              OS: ubuntu-22.04,
              TOOLCHAIN: stable,
              TARGET: i686-unknown-linux-musl,
            }
          - {
              OS: ubuntu-22.04,
              TOOLCHAIN: stable,
              TARGET: aarch64-unknown-linux-musl,
            }
          - {
              OS: ubuntu-22.04,
              TOOLCHAIN: stable,
              TARGET: armv5te-unknown-linux-gnueabi,
            }
          - {
              OS: ubuntu-22.04,
              TOOLCHAIN: stable,
              TARGET: armv7-unknown-linux-gnueabihf,
            }
          - {
              OS: ubuntu-22.04,
              TOOLCHAIN: stable,
              TARGET: arm-unknown-linux-gnueabi,
            }
          - {
              OS: ubuntu-22.04,
              TOOLCHAIN: stable,
              TARGET: arm-unknown-linux-gnueabihf,
            }
          - {
              OS: ubuntu-22.04,
              TOOLCHAIN: stable,
              TARGET: powerpc64le-unknown-linux-gnu,
            }
          - {
              OS: windows-2022,
              TOOLCHAIN: stable,
              TARGET: x86_64-pc-windows-msvc,
            }
          - {
              OS: macos-14,
              TOOLCHAIN: stable,
              TARGET: x86_64-apple-darwin,
            }
          - {
              OS: macos-14,
              TOOLCHAIN: stable,
              TARGET: aarch64-apple-darwin,
            }
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set the release version
        run: echo "RELEASE_VERSION=${GITHUB_REF:11}" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.build.TARGET }}

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release
          cp {LICENSE-MIT,LICENSE-APACHE,README.md,CHANGELOG.md} release/
          if [ "${{ matrix.build.OS }}" = "windows-2022" ]; then
            cp target/${{ matrix.build.TARGET }}/release/${{env.CRATE_NAME}}.exe release/
          else
            cp target/${{ matrix.build.TARGET }}/release/${{env.CRATE_NAME}} release/
          fi
          mv release/ ${{env.CRATE_NAME}}-${{env.RELEASE_VERSION}}/

      - name: Create release artifacts
        shell: bash
        run: |
          if [ "${{ matrix.build.OS }}" = "windows-2022" ]; then
            7z a -tzip "${{env.CRATE_NAME}}-${{ env.RELEASE_VERSION }}-${{ matrix.build.TARGET }}.zip" \
              ${{env.CRATE_NAME}}-${{ env.RELEASE_VERSION }}/
          else
            tar -czvf ${{env.CRATE_NAME}}-${{ env.RELEASE_VERSION }}-${{ matrix.build.TARGET }}.tar.gz \
              ${{env.CRATE_NAME}}-${{ env.RELEASE_VERSION }}/
            shasum -a 512 ${{env.CRATE_NAME}}-${{ env.RELEASE_VERSION }}-${{ matrix.build.TARGET }}.tar.gz \
              > ${{env.CRATE_NAME}}-${{ env.RELEASE_VERSION }}-${{ matrix.build.TARGET }}.tar.gz.sha512
          fi

      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          args: --latest --github-repo ${{ github.repository }}
        env:
          OUTPUT: CHANGES.md

      - name: Upload the binary releases
        uses: svenstaro/upload-release-action@v2
        with:
          file: ${{env.CRATE_NAME}}-${{ env.RELEASE_VERSION }}-${{ matrix.build.TARGET }}*
          file_glob: true
          overwrite: true
          tag: ${{ github.ref }}
          release_name: "Release v${{ env.RELEASE_VERSION }}"
          body: ${{ steps.git-cliff.outputs.content }}
          repo_token: ${{ secrets.RELEASE_TOKEN }}

  publish-crates-io:
    name: Publish on crates.io
    needs: publish-github
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Publish
        run: cargo publish --locked --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
